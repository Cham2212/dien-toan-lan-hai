<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Server Log</title>

<style>
body {
  font-family: Arial;
  background: #0d1117;
  color: #fff;
  padding: 20px;
}

h1 { color: #00ff00; }

button {
  padding: 10px 20px;
  margin: 10px 0;
  border: none;
  border-radius: 6px;
  background: #00ff00;
  color: #000;
  cursor: pointer;
}

.group {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
}

.req { background: #001f2f; }
.ok  { background: #002f00; }
.err { background: #2f0000; }

.log {
  font-family: monospace;
  margin: 5px 0;
}
</style>
</head>

<body>

<h1>🖥 Server Log (Tất cả server)</h1>

<button onclick="loadLog()">🔄 Tải log</button>

<div class="group req">
  <h3>📥 Booking</h3>
  <div id="request"></div>
</div>

<div class="group ok">
  <h3>🔁 Replicate / 2PC</h3>
  <div id="success"></div>
</div>

<div class="group err">
  <h3>📋 Tất cả log</h3>
  <div id="all"></div>
</div>

<script>

// 👉 DANH SÁCH SERVER
const servers = [
  "https://dien-toan-lan-hai.onrender.com",
  "https://hotel-booking-system-new.onrender.com",
  "https://dien-toan-lan-hai-488r.onrender.com"
];

function loadLog() {

  let requestLogs = "";
  let replicateLogs = "";
  let allLogs = "";

  Promise.all(
    servers.map(url =>
      fetch(url + "/api/log")
        .then(res => res.json())
        .then(data => {

          if (data.length === 0) {
            allLogs += `<div class="log">⚠️ ${url} chưa có log</div>`;
          }

          data.forEach(log => {

            // 👉 thêm prefix server
            const fullLog = `[${url}] ${log}`;

            allLogs += `<div class="log">${fullLog}</div>`;

            if (log.includes("booking")) {
              requestLogs += `<div class="log" style="color:#00bfff">${fullLog}</div>`;
            }
            else if (
              log.includes("PREPARE") ||
              log.includes("COMMIT") ||
              log.includes("2PC")
            ) {
              replicateLogs += `<div class="log" style="color:#00ff00">${fullLog}</div>`;
            }

          });

        })
        .catch(() => {
          allLogs += `<div class="log">❌ ${url} DOWN</div>`;
        })
    )
  ).then(() => {

    document.getElementById("request").innerHTML = requestLogs;
    document.getElementById("success").innerHTML = replicateLogs;
    document.getElementById("all").innerHTML = allLogs;

  });

}

// 👉 auto load
window.onload = loadLog;

</script>

</body>
</html>
