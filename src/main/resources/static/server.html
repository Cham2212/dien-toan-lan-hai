<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Server Log</title>

<style>
body {
  font-family: Arial;
  background: #0d1117;
  color: #fff;
  padding: 20px;
}

h1 {
  color: #00ff00;
}

button {
  padding: 10px 20px;
  margin: 10px 0;
  border: none;
  border-radius: 6px;
  background: #00ff00;
  color: #000;
  cursor: pointer;
}

.group {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
}

.req { background: #001f2f; }
.ok  { background: #002f00; }
.err { background: #2f0000; }

.log {
  font-family: monospace;
  margin: 5px 0;
}
</style>

</head>

<body>

<h1>🖥 Server Log</h1>

<button onclick="loadLog()">🔄 Tải log</button>

<div class="group req">
  <h3>📥 Booking</h3>
  <div id="request"></div>
</div>

<div class="group ok">
  <h3>🔁 Replicate</h3>
  <div id="success"></div>
</div>

<div class="group err">
  <h3>📋 Tất cả log</h3>
  <div id="all"></div>
</div>

<script>
function loadLog() {
  fetch("https://dien-toan-lan-hai.onrender.com/api/log")
    .then(res => res.json())
    .then(data => {

      console.log("DATA:", data);

      let requestLogs = "";
      let replicateLogs = "";
      let allLogs = "";

      if (data.length === 0) {
        allLogs = "<div class='log'>⚠️ Chưa có log nào</div>";
      }

      data.forEach(log => {

        allLogs += `<div class="log">${log}</div>`;

        if (log.includes("nhận booking")) {
          requestLogs += `<div class="log" style="color:#00bfff">${log}</div>`;
        }
        else if (log.includes("nhận từ server khác")) {
          replicateLogs += `<div class="log" style="color:#00ff00">${log}</div>`;
        }

      });

      document.getElementById("request").innerHTML = requestLogs;
      document.getElementById("success").innerHTML = replicateLogs;
      document.getElementById("all").innerHTML = allLogs;

    })
    .catch(err => {
      alert("❌ Không load được log!");
      console.error(err);
    });
}

// 👉 tự load khi mở trang
window.onload = loadLog;
</script>

</body>
</html>
